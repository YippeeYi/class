<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; connect-src 'self' https://xyeftofxlxbpqctuuqup.supabase.co; img-src 'self' data: blob: https://xyeftofxlxbpqctuuqup.supabase.co; style-src 'self' 'unsafe-inline'; font-src 'self'; object-src 'none'; base-uri 'none'; form-action 'self'; frame-src 'none'; worker-src 'none'">
    <meta name="referrer" content="same-origin">
    <title>个人页面</title>
    <script src="js/themeBootstrap.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico">
    <script src="js/siteCache.js"></script>
    <script src="js/loadingState.js"></script>
    <script src="js/authGate.js"></script>
    <script src="js/navigation.js"></script>
</head>

<body class="person-page">
    <div class="page-header">
        <button class="back-to-guide-btn" aria-label="返回导览页面" title="返回导览页面" data-nav-target="index.html">🏠</button>
    </div>

    <h1 id="person-name"></h1>
    <div id="person-loading" class="page-loading loading-state person-loading" role="status" aria-live="polite">
        <span class="loading-spinner" aria-hidden="true"></span>
        <strong class="loading-text">正在加载人物资料…</strong>
        <span>相关记录将在资料显示后继续加载。</span>
    </div>
    <div id="person-info" class="person-info" hidden>
        <div class="info-row">
            <span class="info-label">别名：</span>
            <span class="info-value" id="person-alias"></span>
        </div>

        <div class="info-row">
            <span class="info-label">简介：</span>
            <span class="info-value" id="person-bio"></span>
        </div>
    </div>


    <div class="record-switch is-pending">
        <button class="switch-btn active" data-type="participated">参与的事件</button>
        <button class="switch-btn" data-type="authored">记录的事件</button>
    </div>

    <div id="record-filter" hidden></div>

    <div id="record-list" aria-busy="true">
        <div class="page-loading loading-state" role="status"><span class="loading-spinner" aria-hidden="true"></span><strong class="loading-text">正在加载相关记录…</strong></div>
    </div>

    <!-- Cache + Store -->
    <script src="js/cacheLoader.js"></script>
    <script src="js/recordStore.js"></script>
    <script src="js/peopleStore.js"></script>
    <script src="js/recordRenderer.js"></script>
    <script src="js/bootstrap.js"></script>
    <script src="js/backgroundOptions.js"></script>
    <script src="js/backgroundSwitcher.js"></script>

    <!-- 渲染和页面逻辑 -->
    <script src="js/person.js"></script>

</body>

</html>
