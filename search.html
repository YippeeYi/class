<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编日史 · 全站搜索</title>
    <script src="js/themeBootstrap.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico">
    <link rel="preload" href="fonts/GoogleSansFlex/GoogleSansFlex-VariableFont_GRAD,ROND,opsz,slnt,wdth,wght.ttf"
        as="font" type="font/ttf" crossorigin>
    <script src="js/siteCache.js"></script>
    <script src="js/authGate.js"></script>
    <script src="js/navigation.js"></script>
</head>

<body class="feature-page search-page">
    <div class="page-header">
        <button class="back-to-guide-btn" aria-label="返回导览页面" title="返回导览页面" data-nav-target="index.html">🏠</button>
    </div>

    <main class="search-shell">
        <header class="search-head">
            <div>
                <h1>全站搜索</h1>
                <p id="search-summary">搜索记录、人物与名言。</p>
            </div>
        </header>

        <section class="search-panel" aria-label="搜索条件">
            <div class="search-input-wrap">
                <input id="global-search-input" class="global-search-input" type="search" placeholder="输入人名、名言、记录内容或日期"
                    autocomplete="off" autofocus aria-label="全站搜索关键词">
            </div>
            <div id="global-search-types" class="search-type-controls" aria-label="搜索范围">
                <button type="button" class="btn-action search-type is-active" data-type="record">记录</button>
                <button type="button" class="btn-action search-type is-active" data-type="person">人物</button>
                <button type="button" class="btn-action search-type is-active" data-type="quote">名言</button>
            </div>
        </section>

        <section id="search-results" class="search-results" aria-live="polite"></section>
    </main>

    <script src="js/cacheLoader.js"></script>
    <script src="js/recordStore.js"></script>
    <script src="js/peopleStore.js"></script>
    <script src="js/recordRenderer.js"></script>
    <script src="js/quoteStore.js"></script>
    <script src="js/bootstrap.js"></script>
    <script src="js/backgroundOptions.js"></script>
    <script src="js/backgroundSwitcher.js"></script>
    <script src="js/search.js"></script>
    <!-- Cloudflare Web Analytics -->
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js'
        data-cf-beacon='{"token": "1111e0403f354ef6a4e0ef29b62e3e2e"}'></script><!-- End Cloudflare Web Analytics -->
</body>

</html>
