<head>

    <title>编日史 · 名言</title>
    <script src="js/themeBootstrap.js"></script>

    <div class="page-header">
        <button class="back-to-guide-btn" aria-label="返回导航页面" title="返回导航页面"

    <h1>名言</h1>

    <div class="sort-controls">
        <div class="sort-dropdown" data-field="sort-key">
            <button type="button" class="btn-select dropdown-trigger" data-value="id">
                <span class="dropdown-label">按 ID</span>
                <span class="dropdown-arrow" aria-hidden="true">▾</span>
            </button>
            <div class="select-menu" role="menu" aria-label="排序依据">
                <button type="button" class="btn-action sort-option is-active" data-field="sort-key"
                    data-value="id">ID</button>
                <button type="button" class="btn-action sort-option" data-field="sort-key"
                    data-value="quote">内容</button>
            </div>
        </div>

        <button type="button" class="btn-action sort-order-toggle" data-value="asc">升序</button>
    </div>

    <div id="quotes-list" aria-busy="true">
        <div class="record-empty" role="status"><strong>正在整理名言…</strong></div>
    </div>

    <script src="js/cacheLoader.js"></script>
    <script src="js/recordStore.js"></script>
    <script src="js/peopleStore.js"></script>
