<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编日史 - 导览</title>
    <link rel="stylesheet" href="style.css?v=20260625">
    <link rel="icon" href="favicon.ico">
    <link rel="preload" href="fonts/GoogleSansFlex/GoogleSansFlex-VariableFont_GRAD,ROND,opsz,slnt,wdth,wght.ttf" as="font" type="font/ttf" crossorigin>
    <script src="js/authGate.js?v=20260625"></script>
    <script src="js/navigation.js?v=20260625"></script>
    <script src="js/imageCache.js?v=20260625"></script>
</head>
<body class="guide-page">
    <div class="top-right-actions"><button id="clear-access-btn" class="top-action-btn btn-action">账号</button></div>
    <main class="guide-main">
        <img class="guide-logo" src="logo-guide.png" alt="编日史 logo" draggable="false">
        <div id="guide-progress" class="guide-progress" hidden><div class="guide-progress-track"><div id="guide-progress-fill" class="guide-progress-fill"></div></div><p id="guide-progress-text" class="guide-progress-text">数据加载中 0%</p></div>
        <section id="guide-highlights" class="guide-highlights" hidden>
            <header class="guide-section-head"><div><p class="guide-eyebrow">Class Archive</p><h2>档案导览</h2></div></header>
            <div class="guide-primary-grid" aria-label="核心入口">
                <article class="guide-entry-card guide-entry-card--record guide-stat-link" data-target="record.html" role="link" tabindex="0" aria-label="记录"><span class="guide-entry-icon">&bull;</span><h3>记录</h3><strong id="guide-record-count" class="guide-entry-value">--</strong></article>
                <article class="guide-entry-card guide-entry-card--primary guide-stat-link" data-target="people.html" role="link" tabindex="0" aria-label="人物"><span class="guide-entry-icon">&bull;</span><h3>人物</h3><strong id="guide-people-count" class="guide-entry-value">--</strong></article>
                <article class="guide-entry-card guide-entry-card--primary guide-stat-link" data-target="glossary.html" role="link" tabindex="0" aria-label="术语"><span class="guide-entry-icon">&bull;</span><h3>术语</h3><strong id="guide-term-count" class="guide-entry-value">--</strong></article>
            </div>
            <button id="guide-today-link" class="btn-action guide-today-link" type="button" hidden>看看历史上的今天发生了什么？</button>
            <p id="guide-tip" class="guide-tip">小提示：记录、人物和术语是最常用的三个入口。</p>
        </section>
        <nav class="guide-secondary-panel" aria-label="次要入口" hidden><div class="guide-secondary-grid">
            <article class="guide-secondary-card guide-stat-link" data-target="timeline.html" role="link" tabindex="0"><span>&bull;</span><strong>统计</strong></article>
            <article class="guide-secondary-card guide-stat-link" data-target="search.html" role="link" tabindex="0"><span>&bull;</span><strong>搜索</strong></article>
            <article class="guide-secondary-card guide-stat-link" data-target="quiz.html" role="link" tabindex="0"><span>&bull;</span><strong>答题</strong></article>
            <article class="guide-secondary-card guide-stat-link" data-target="achievements.html" role="link" tabindex="0"><span>&bull;</span><strong>成就</strong></article>
            <article class="guide-secondary-card guide-stat-link" data-target="shop.html" role="link" tabindex="0"><span>&bull;</span><strong>背景</strong></article>
            <article class="guide-secondary-card guide-stat-link" data-target="wall.html" role="link" tabindex="0"><span>&bull;</span><strong>留言</strong></article>
            <article class="guide-secondary-card guide-stat-link" data-target="credits.html" role="link" tabindex="0"><span>&bull;</span><strong>致谢</strong></article>
            <article id="guide-admin-entry" class="guide-secondary-card guide-stat-link" data-target="admin.html" role="link" tabindex="0" hidden><span>&bull;</span><strong>审核</strong></article>
        </div></nav>
    </main>
    <script src="js/cacheLoader.js?v=20260625"></script>
    <script src="js/recordStore.js?v=20260625"></script>
    <script src="js/peopleStore.js?v=20260625"></script>
    <script src="js/glossaryStore.js?v=20260625"></script>
    <script src="js/qcoinSystem.js?v=20260625"></script>
    <script src="js/backgroundOptions.js?v=20260625"></script>
    <script src="js/backgroundSwitcher.js?v=20260625"></script>
    <script src="js/achievementSystem.js?v=20260625"></script>
    <script src="js/guide.js?v=20260625"></script>
    <script src="js/authControls.js?v=20260625"></script>
</body>
</html>
