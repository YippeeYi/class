<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编日史 · 导览</title>
    <script src="js/themeBootstrap.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico">
    <link rel="preload" href="fonts/GoogleSansFlex/GoogleSansFlex-VariableFont_GRAD,ROND,opsz,slnt,wdth,wght.ttf"
        as="font" type="font/ttf" crossorigin>
    <link rel="preload" href="logo-guide.png" as="image">
    <script src="js/siteCache.js"></script>
    <script src="js/authGate.js"></script>
    <script src="js/navigation.js"></script>
</head>

<body class="guide-page">
    <div class="top-right-actions">
        <button id="clear-access-btn" class="top-action-btn btn-action">移除密钥</button>
    </div>
    <button id="guide-today-history" class="btn-action guide-today-history" type="button" hidden>历史上的今天</button>

    <main class="guide-main">
        <img class="guide-logo" src="logo-guide.png" alt="编日史 logo" draggable="false" width="1035" height="462"
            loading="eager" decoding="async" fetchpriority="high">

        <div id="guide-progress" class="guide-progress" hidden>
            <div class="guide-progress-track">
                <div id="guide-progress-fill" class="guide-progress-fill"></div>
            </div>
            <p id="guide-progress-text" class="guide-progress-text">缓存加载中 0%</p>
        </div>

        <section id="guide-highlights" class="guide-highlights" hidden>
            <header class="guide-section-head">
                <div>
                    <p class="guide-eyebrow">Class Archive</p>
                    <h2>档案导览</h2>
                </div>
            </header>

            <div class="guide-primary-grid" aria-label="核心入口">
                <article class="guide-entry-card guide-entry-card--record guide-stat-link" data-target="record.html"
                    role="link" tabindex="0" aria-label="跳转到记录页面">
                    <span class="guide-entry-icon">📜</span>
                    <h3>记录</h3>
                    <strong id="guide-record-count" class="guide-entry-value">--</strong>
                </article>
                <article class="guide-entry-card guide-entry-card--primary guide-stat-link" data-target="people.html"
                    role="link" tabindex="0" aria-label="跳转到人物名单页面">
                    <span class="guide-entry-icon">👥</span>
                    <h3>人物</h3>
                    <strong id="guide-people-count" class="guide-entry-value">--</strong>
                </article>
                <article class="guide-entry-card guide-entry-card--primary guide-stat-link" data-target="glossary.html"
                    role="link" tabindex="0" aria-label="跳转到名言页面">
                    <span class="guide-entry-icon">📚</span>
                    <h3>名言</h3>
                    <strong id="guide-term-count" class="guide-entry-value">--</strong>
                </article>
            </div>

            <p id="guide-tip" class="guide-tip">💡 小提示：记录、人物和名言是最常用的三个入口。</p>
        </section>

        <nav class="guide-secondary-panel" aria-label="次要入口" hidden>
            <div class="guide-secondary-grid">
                <article class="guide-secondary-card guide-stat-link" data-target="timeline.html" role="link"
                    tabindex="0" aria-label="跳转到数据统计页面"><span>🗓️</span><strong>统计</strong></article>
                <article class="guide-secondary-card guide-stat-link" data-target="search.html" role="link" tabindex="0"
                    aria-label="跳转到全站搜索页面"><span>🔎</span><strong>搜索</strong></article>
                <article class="guide-secondary-card guide-stat-link" data-target="quiz.html" role="link" tabindex="0"
                    aria-label="跳转到答题页面"><span>🧠</span><strong>答题</strong></article>
                <article class="guide-secondary-card guide-stat-link" data-target="shop.html" role="link" tabindex="0"
                    aria-label="跳转到背景页面"><span>🎨</span><strong>背景</strong></article>
                <article class="guide-secondary-card guide-stat-link" data-target="credits.html" role="link"
                    tabindex="0" aria-label="跳转到制作组与致谢页面"><span>✨</span><strong>致谢</strong></article>
            </div>
        </nav>
    </main>

    <script src="js/cacheLoader.js"></script>
    <script src="js/recordStore.js"></script>
    <script src="js/peopleStore.js"></script>
    <script src="js/glossaryStore.js"></script>
    <script src="js/backgroundOptions.js"></script>
    <script src="js/backgroundSwitcher.js"></script>
    <script src="js/guide.js"></script>
    <!-- Cloudflare Web Analytics -->
    <script defer src='https://static.cloudflareinsights.com/beacon.min.js'
        data-cf-beacon='{"token": "1111e0403f354ef6a4e0ef29b62e3e2e"}'></script><!-- End Cloudflare Web Analytics -->
</body>

</html>
