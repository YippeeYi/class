<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; connect-src 'self' https://*.supabase.co; img-src 'self' data: blob: https://*.supabase.co; style-src 'self' 'unsafe-inline'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
    <meta name="referrer" content="same-origin">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编日史 · 档案时间线</title>
    <script src="js/themeBootstrap.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico">
    <link rel="preload" href="fonts/GoogleSansFlex/GoogleSansFlex-VariableFont_GRAD,ROND,opsz,slnt,wdth,wght.ttf"
        as="font" type="font/ttf" crossorigin>
    <script src="js/siteCache.js"></script>
    <script src="js/authGate.js"></script>
    <script src="js/navigation.js"></script>
</head>

<body class="feature-page timeline-page">
    <div class="page-header">
        <button class="back-to-guide-btn" aria-label="返回主页" title="返回主页" data-nav-target="index.html">↩</button>
    </div>

    <main class="archive-tool-shell timeline-shell">
        <header class="archive-tool-head">
            <div>
                <h1>档案时间线</h1>
                <p id="timeline-summary">按年份与月份回看记录密度、重要事件、活跃人物和名言热度。</p>
            </div>
            <div class="archive-tool-actions">
                <div class="timeline-metric-switch switch-group" aria-label="统计对象">
                    <button type="button" class="switch-btn active" data-timeline-metric="count" aria-pressed="true">记录条数</button>
                    <button type="button" class="switch-btn" data-timeline-metric="characters" aria-pressed="false">记录字数</button>
                </div>
                <button type="button" class="btn-action" data-nav-target="record.html">查看全部记录</button>
            </div>
        </header>

        <section id="timeline-overview" class="archive-overview" aria-label="档案总览"></section>
        <section id="timeline-years" class="timeline-years" aria-label="年份列表"></section>
        <section id="timeline-year-overview" class="timeline-year-overview" aria-live="polite"></section>
        <section id="timeline-months" class="timeline-months" aria-label="月份列表"></section>
        <section id="timeline-detail" class="timeline-detail" aria-live="polite"></section>
    </main>

    <script src="js/cacheLoader.js"></script>
    <script src="js/recordStore.js"></script>
    <script src="js/peopleStore.js"></script>
    <script src="js/recordRenderer.js"></script>
    <script src="js/quoteStore.js"></script>
    <script src="js/bootstrap.js"></script>
    <script src="js/backgroundOptions.js"></script>
    <script src="js/backgroundSwitcher.js"></script>
    <script src="js/timeline.js"></script>
</body>

</html>
