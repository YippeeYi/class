<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>编日史 · 成就</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico">
    <link rel="preload" href="fonts/GoogleSansFlex/GoogleSansFlex-VariableFont_GRAD,ROND,opsz,slnt,wdth,wght.ttf"
        as="font" type="font/ttf" crossorigin>
    <script src="js/authGate.js"></script>
    <script src="js/navigation.js"></script>
    <script src="js/imageCache.js"></script>
</head>

<body class="feature-page achievement-page">
    <div class="page-header">
        <button class="back-to-guide-btn" aria-label="返回主页" title="返回主页" data-nav-target="index.html">↩</button>
    </div>

    <main class="achievement-shell">
        <header class="achievement-head">
            <div>
                <h1>成就</h1>
                <p id="achievement-summary">已完成 0 / 0</p>
            </div>
            <div class="achievement-actions">
                <div class="sort-controls achievement-sort-controls">
                    <div class="sort-dropdown" data-field="sort-key">
                        <button type="button" class="btn-select dropdown-trigger" data-value="progress">
                            <span class="dropdown-label">按完成进度</span>
                            <span class="dropdown-arrow" aria-hidden="true">▾</span>
                        </button>
                        <div class="select-menu" role="menu" aria-label="成就排序依据">
                            <button type="button" class="btn-action sort-option is-active" data-field="sort-key" data-value="progress">完成进度</button>
                            <button type="button" class="btn-action sort-option" data-field="sort-key" data-value="group">类型</button>
                        </div>
                    </div>
                    <button type="button" class="btn-action sort-order-toggle" data-value="desc">降序</button>
                </div>
                <button id="achievement-hide-complete" class="btn-action achievement-toggle" type="button" aria-pressed="false">隐藏已完成</button>
            </div>
        </header>
        <section class="achievement-section">
            <h2>普通成就</h2>
            <div id="achievement-normal-list" class="achievement-list" aria-live="polite"></div>
        </section>
        <section class="achievement-section achievement-section--hidden">
            <h2>隐藏成就</h2>
            <div id="achievement-hidden-list" class="achievement-list" aria-live="polite"></div>
        </section>
    </main>

    <script src="js/bootstrap.js"></script>
    <script src="js/qcoinSystem.js"></script>
    <script src="js/achievementSystem.js"></script>
    <script src="js/backgroundOptions.js"></script>
    <script src="js/backgroundSwitcher.js"></script>
    <script src="js/achievements.js"></script>
    <script src="js/reviewSystem.js"></script>
    <script src="js/correctionWidget.js"></script>
</body>

</html>
