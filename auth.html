<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache">
    <title>登录 - 编日史</title>
    <link rel="stylesheet" href="style.css?v=20260625">
    <link rel="icon" href="favicon.ico">
    <script src="js/authGate.js?v=20260625"></script>
    <script src="js/imageCache.js?v=20260625"></script>
</head>
<body class="auth-page">
    <div class="auth-card">
        <h1>登录编日史</h1>
        <p class="auth-hint">使用管理员分配的账号和密码登录。密码由 Supabase Auth 管理，本站不会保存明文密码。</p>
        <form class="auth-form">
            <input type="text" name="login" placeholder="账号或邮箱" autocomplete="username" required>
            <input type="password" name="password" placeholder="密码" autocomplete="current-password" required>
            <button type="submit">登录</button>
        </form>
        <p class="auth-error" aria-live="polite"></p>
    </div>
    <script src="js/authPage.js?v=20260625"></script>
</body>
</html>
